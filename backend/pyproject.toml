[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 115
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI's dependency injection requires `Depends(...)` as an
# argument default — that's the framework's intended pattern, not the
# footgun this bugbear rule is meant to catch.
ignore = ["B008"]
